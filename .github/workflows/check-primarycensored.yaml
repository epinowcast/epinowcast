# Check that the vendored primarycensored Stan functions are up to date with
# the latest released primarycensored. Regenerates them via the vendoring
# script and opens a pull request if anything changed. Mirrors the approach
# used by EpiNow2
# (https://github.com/epiforecasts/EpiNow2/blob/main/.github/workflows/check-primarycensored.yaml).
on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

name: Check vendored primarycensored

permissions:
  contents: write
  pull-requests: write

jobs:
  check-primarycensored:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          install-pandoc: false
          packages: |
            any::primarycensored

      - name: Regenerate vendored Stan functions
        run: Rscript inst/dev/vendor-primarycensored.R

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update vendored primarycensored Stan functions"
          title: "chore: update vendored primarycensored Stan functions"
          body: |
            The vendored primarycensored Stan functions in
            `inst/stan/functions/primarycensored.stan` are out of date with the
            latest released `primarycensored`. This PR regenerates them with
            `inst/dev/vendor-primarycensored.R`.

            Please verify the changes (and run the model and
            `tests/testthat/test-stan_primarycensored_pmf.R`) before merging.
          branch: update-vendored-primarycensored
          delete-branch: true
