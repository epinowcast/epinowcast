name: Benchmarks

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      # Stan code: any change here can shift wall-time
      - "inst/stan/**"
      # Benchmarking code itself
      - "touchstone/**"
      # Benchmark workflows
      - ".github/workflows/benchmarks*.yaml"
      # Manual trigger file: touch `.benchmark` to force a benchmark run
      - ".benchmark"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.read_touchstone_config.outputs.config }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: read_touchstone_config
        run: |
          {
            echo 'config<<EOF'
            cat ./touchstone/config.json
            echo EOF
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - ${{ fromJson(needs.prepare.outputs.config) }}
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: 'https://stan-dev.r-universe.dev'

      - name: Install cmdstanr
        run: |
          install.packages("cmdstanr")
        shell: Rscript {0}

      - name: Install cmdstan
        uses: epinowcast/actions/install-cmdstan@v1
        with:
          cmdstan-version: 'latest'
          num-cores: 2

      - uses: lorenzwalthert/touchstone/actions/receive@main
        with:
          cache-version: 2
          touchstone_ref: '@main'
          extra-packages: any::cmdstanr
          extra-repositories: 'https://stan-dev.r-universe.dev'
          benchmarking_repo: ${{ matrix.config.benchmarking_repo }}
          benchmarking_ref: ${{ matrix.config.benchmarking_ref }}
          benchmarking_path: ${{ matrix.config.benchmarking_path }}
